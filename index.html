function parseISOtoDate(s) {
  if (!s) return null;
  return new Date(s);
}

function fmtTime(s) {
  if (!s) return '';
  const d = new Date(s);
  return d.toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit', hour12:true});
}

function renderForDate(selectedDate) {
  let totalTasks = 0, activeCount = 0, busiestName = '', busiestCount = 0;
  const insights = [];

  let cardsHTML = '';
  for (const [name, data] of Object.entries(EMP_DATA)) {
    const tasks = (data.byDate && data.byDate[selectedDate]) || [];
    const count = tasks.length;
    totalTasks += count;
    if (count > 0) activeCount++;
    if (count > busiestCount) { busiestCount = count; busiestName = name; }

    let tasksHTML = '';
    if (count === 0) {
      tasksHTML = '<div class="no-tasks"><div class="no-tasks-icon">😴</div><div>No tasks logged</div></div>';
    } else {
      tasks.forEach(t => {
        const startStr = t.start ? fmtTime(t.start) : '';
        const endStr = t.end ? fmtTime(t.end) : '';
        const timeLabel = startStr ? (endStr ? startStr + ' – ' + endStr : startStr) : '';
        tasksHTML += '<div class="task-item">' +
          (timeLabel ? '<div class="task-time"><span class="task-time-dot" style="background:' + data.color + '"></span>' + timeLabel + '</div>' : '') +
          '<div class="task-title">' + (t.title || '(No title)') + '</div>' +
          (t.desc ? '<div class="task-desc">' + t.desc + '</div>' : '') +
          '</div>';
      });
    }

    const initials = name.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
    cardsHTML += '<div class="card">' +
      '<div class="card-header">' +
        '<div class="avatar" style="background:' + data.color + '">' + initials + '</div>' +
        '<div><div class="card-name">' + name + '</div><div class="card-count">' + count + ' task' + (count!==1?'s':'') + ' logged</div></div>' +
      '</div>' +
      '<div class="card-body">' + tasksHTML + '</div>' +
      '</div>';
  }

  document.getElementById('teamGrid').innerHTML = cardsHTML;

  // Update stats
  document.getElementById('statActive').textContent = activeCount;
  document.getElementById('statTasks').textContent = totalTasks;
  document.getElementById('statAvg').textContent = activeCount > 0 ? (totalTasks/activeCount).toFixed(1) : '0';
  document.getElementById('statBusiest').textContent = busiestName ? busiestName.split(' ')[0] : '—';

  // Insights
  const dateLabel = new Date(selectedDate + 'T00:00:00').toLocaleDateString('en-IN', {weekday:'long',day:'2-digit',month:'long',year:'numeric'});
  document.getElementById('gridTitle').textContent = '👥 Team Activity — ' + dateLabel;

  let insightsHTML = '<h3>🤖 AI Insights — ' + dateLabel + '</h3><div class="insights-grid">' +
    '<div class="insight-item"><div class="insight-label">Participation Rate</div><div class="insight-value">' + Math.round(activeCount/12*100) + '%</div><div class="insight-sub">' + activeCount + ' of 12 members active</div></div>' +
    '<div class="insight-item"><div class="insight-label">Top Contributor</div><div class="insight-value">' + (busiestName || '—') + '</div><div class="insight-sub">' + busiestCount + ' tasks logged</div></div>' +
    '<div class="insight-item"><div class="insight-label">Total Work Items</div><div class="insight-value">' + totalTasks + '</div><div class="insight-sub">Across all members</div></div>' +
    '<div class="insight-item"><div class="insight-label">Avg Load</div><div class="insight-value">' + (activeCount > 0 ? (totalTasks/activeCount).toFixed(1) : '0') + '</div><div class="insight-sub">Tasks per active member</div></div>' +
    '</div>';

  // Inactive members
  const inactive = Object.entries(EMP_DATA).filter(([n,d]) => !((d.byDate && d.byDate[selectedDate]) && d.byDate[selectedDate].length > 0)).map(([n])=>n);
  if (inactive.length > 0) {
    insightsHTML += '<div style="margin-top:14px;font-size:0.8rem;color:#64748b;">⚠️ No tasks logged: <span style="color:#f59e0b">' + inactive.join(', ') + '</span></div>';
  }

  document.getElementById('insightsSection').innerHTML = insightsHTML;
}

// Init
const now = new Date();
document.getElementById('updateTime').textContent = 'Updated: ' + now.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true});
document.getElementById('footerTime').textContent = 'Generated ' + now.toLocaleString('en-IN');

const sel = document.getElementById('dateSelect');
renderForDate(sel.value);
</script>
