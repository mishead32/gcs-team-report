const employees = ["Alok","Arun Sharma","Ayush","Boney","Devinder","Diksha","Gunjan","Mehak","Priyanka","Rajinder","Rohit","Santosh K"];

function getInitials(name) {
  return name.split(' ').map(p => p[0]).join('').substring(0, 2).toUpperCase();
}

function computeHours(events) {
  let total = 0;
  for (const ev of events) {
    if (ev.start && ev.end) {
      const [sh, sm] = ev.start.split(':').map(Number);
      const [eh, em] = ev.end.split(':').map(Number);
      const mins = (eh * 60 + em) - (sh * 60 + sm);
      if (mins > 0) total += mins;
    }
  }
  return (total / 60).toFixed(1);
}

function formatDate(d) {
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('en-IN', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
}

function renderCards() {
  const date = document.getElementById('dateSelect').value;
  const search = document.getElementById('searchBox').value.toLowerCase();
  const grid = document.getElementById('cardGrid');
  
  let activeCount = 0, totalEvents = 0, totalHrs = 0, hrCount = 0;
  let html = '';
  
  for (const name of employees) {
    if (search && !name.toLowerCase().includes(search)) continue;
    const emp = EMP_DATA[name];
    const events = (emp.dateData[date] || []).sort((a,b) => a.start.localeCompare(b.start));
    const hours = events.length > 0 ? computeHours(events) : 0;
    
    if (events.length > 0) { activeCount++; totalHrs += parseFloat(hours); hrCount++; }
    totalEvents += events.length;
    
    const eventsHtml = events.length === 0 
      ? `<div class="no-events"><div class="no-events-icon">📅</div><p>No events recorded for this date</p></div>`
      : events.map(ev => `
        <div class="event-item">
          <div class="event-time">${ev.start || '--:--'}${ev.end ? ' – ' + ev.end : ''}</div>
          <div class="event-dot" style="background:${emp.color}"></div>
          <div>
            <div class="event-title">${ev.title}</div>
            ${ev.desc ? `<div class="event-desc">${ev.desc.substring(0,80)}${ev.desc.length > 80 ? '…' : ''}</div>` : ''}
          </div>
        </div>
      `).join('');
    
    html += `
      <div class="card">
        <div class="card-header">
          <div class="avatar" style="background:${emp.color}">${getInitials(name)}</div>
          <div>
            <div class="card-name">${name}</div>
            <div class="card-meta">${events.length} event${events.length !== 1 ? 's' : ''} &bull; ${emp.totalRecords} total records</div>
          </div>
          ${events.length > 0 ? `<div class="hours-badge">⏱ ${hours}h</div>` : ''}
        </div>
        <div class="events-list">${eventsHtml}</div>
        <div class="card-footer">
          <span>${events.length > 0 ? 'Active on this date' : 'No activity'}</span>
          <span style="color:${emp.color};font-weight:600">${events.length > 0 ? hours + ' hrs logged' : '—'}</span>
        </div>
      </div>
    `;
  }
  
  grid.innerHTML = html;
  document.getElementById('statActive').textContent = activeCount;
  document.getElementById('statTasks').textContent = totalEvents;
  document.getElementById('statHours').textContent = hrCount > 0 ? (totalHrs / hrCount).toFixed(1) : '0';
  document.getElementById('updatedInfo').textContent = `Showing data for ${formatDate(date)} &bull; Report generated: ${new Date().toLocaleString('en-IN', {timeZone:'Asia/Kolkata'})} IST`;
}

function prevDate() {
  const sel = document.getElementById('dateSelect');
  if (sel.selectedIndex > 0) { sel.selectedIndex--; renderCards(); }
}
function nextDate() {
  const sel = document.getElementById('dateSelect');
  if (sel.selectedIndex < sel.options.length - 1) { sel.selectedIndex++; renderCards(); }
}

// Initial render
renderCards();
</script>
