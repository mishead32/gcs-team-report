  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  /* Header */
  .header{background:linear-gradient(135deg,#1e1b4b 0%,#312e81 50%,#1e1b4b 100%);padding:28px 32px;border-bottom:1px solid #4338ca44}
  .header-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}
  .brand{display:flex;align-items:center;gap:14px}
  .brand-icon{width:48px;height:48px;background:#6366f1;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px}
  .brand-name{font-size:22px;font-weight:700;color:#fff}
  .brand-sub{font-size:13px;color:#a5b4fc;margin-top:2px}
  .gen-time{font-size:12px;color:#a5b4fc;background:#ffffff12;padding:6px 14px;border-radius:20px;border:1px solid #ffffff18}
  /* Controls */
  .controls{max-width:1400px;margin:0 auto;padding:20px 32px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .date-tabs{display:flex;gap:8px;flex-wrap:wrap}
  .date-tab{padding:8px 18px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;font-size:13px;transition:all .2s}
  .date-tab.active,.date-tab:hover{background:#6366f1;color:#fff;border-color:#6366f1}
  .search-wrap{margin-left:auto}
  .search-box{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px 16px;border-radius:8px;font-size:13px;outline:none;width:220px}
  .search-box:focus{border-color:#6366f1}
  /* Stats bar */
  .stats-bar{max-width:1400px;margin:0 auto;padding:0 32px 20px;display:flex;gap:16px;flex-wrap:wrap}
  .stat-pill{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 20px;flex:1;min-width:140px}
  .stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .stat-value{font-size:24px;font-weight:700;color:var(--text);margin-top:4px}
  /* Grid */
  .grid{max-width:1400px;margin:0 auto;padding:0 32px 40px;display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:20px}
  /* Card */
  .emp-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:transform .2s,box-shadow .2s}
  .emp-card:hover{transform:translateY(-2px);box-shadow:0 8px 32px #00000040}
  .emp-card.hidden{display:none}
  .card-header{padding:18px 20px;display:flex;align-items:center;gap:12px;background:var(--surface2)}
  .emp-avatar{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;flex-shrink:0}
  .emp-meta{flex:1;min-width:0}
  .emp-name{font-size:15px;font-weight:600}
  .emp-email{font-size:11px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .task-count-badge{padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap}
  /* Insight */
  .insight-box{padding:12px 20px;font-size:12px;color:#c7d2fe;background:#6366f108;border-bottom:1px solid var(--border);line-height:1.5}
  /* Tasks */
  .tasks-list{padding:14px 20px;display:flex;flex-direction:column;gap:10px;max-height:340px;overflow-y:auto}
  .tasks-list::-webkit-scrollbar{width:4px}
  .tasks-list::-webkit-scrollbar-thumb{background:#334155;border-radius:4px}
  .task-row{display:flex;gap:10px;align-items:flex-start}
  .task-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
  .task-body{flex:1;min-width:0}
  .task-time{font-size:10px;color:var(--muted);font-family:monospace}
  .task-title{font-size:13px;color:var(--text);margin-top:2px;line-height:1.4}
  .lunch-task{color:var(--muted);font-style:italic}
  .dur-badge{display:inline-block;font-size:10px;color:var(--muted);background:var(--surface2);padding:1px 6px;border-radius:4px;margin-top:3px}
  .no-tasks{color:var(--muted);font-size:13px;font-style:italic;padding:8px 0}
  /* Footer */
  .footer{text-align:center;padding:20px;color:var(--muted);font-size:12px;border-top:1px solid var(--border)}
  @media(max-width:600px){
    .header-inner,.controls,.stats-bar,.grid{padding-left:16px;padding-right:16px}
    .grid{grid-template-columns:1fr}
  }
</style>
</head>

  "#6366f1","#0ea5e9","#10b981","#f59e0b","#ef4444",
  "#8b5cf6","#ec4899","#14b8a6","#f97316","#06b6d4",
  "#84cc16","#a855f7"
];

const empNames = Object.keys(TEAM_DATA);

function fmtDur(mins) {
  if(!mins||mins<=0) return "";
  const h=Math.floor(mins/60), m=mins%60;
  return h&&m?`${h}h ${m}m`:h?`${h}h`:`${m}m`;
}

function insight(name, events) {
  if(!events.length) return "No activity logged for this period.";
  const meetings = events.filter(e => /meeting|hod|sk.?bz|daily|morning/i.test(e.title));
  const productive = events.filter(e => e.dur>=60 && !/lunch|break/i.test(e.title));
  const totalMin = events.reduce((s,e)=>s+(e.dur||0),0);
  const parts=[];
  if(totalMin) parts.push(`Logged <b>${Math.floor(totalMin/60)}h ${totalMin%60}m</b> total`);
  if(meetings.length) parts.push(`attended <b>${meetings.length} meeting(s)</b>`);
  if(productive.length) parts.push(`completed <b>${productive.length} focused task(s)</b>`);
  return parts.length?(parts.join(", ")+".").replace(/^./,c=>c.toUpperCase()):"Routine day.";
}

function renderDates() {
  const tabs = document.getElementById("dateTabs");
  tabs.innerHTML = ALL_DATES.map(d => {
    const label = new Date(d+"T12:00:00").toLocaleDateString("en-IN",{weekday:"short",day:"numeric",month:"short"});
    return `<button class="date-tab${d===activeDate?" active":""}" onclick="selectDate('${d}')">${label}</button>`;
  }).join("");
}

function selectDate(d) {
  activeDate = d;
  renderDates();
  renderCards();
  renderStats();
}

function renderStats() {
  const allEvents = empNames.flatMap(n=>(TEAM_DATA[n].events||[]).filter(e=>e.date===activeDate));
  const totalTasks = allEvents.length;
  const totalMins = allEvents.reduce((s,e)=>s+(e.dur||0),0);
  const active = empNames.filter(n=>(TEAM_DATA[n].events||[]).some(e=>e.date===activeDate)).length;
  const meetings = allEvents.filter(e=>/meeting|hod/i.test(e.title)).length;
  document.getElementById("statsBar").innerHTML = `
    <div class="stat-pill"><div class="stat-label">Active Members</div><div class="stat-value">${active}/${empNames.length}</div></div>
    <div class="stat-pill"><div class="stat-label">Total Tasks</div><div class="stat-value">${totalTasks}</div></div>
    <div class="stat-pill"><div class="stat-label">Total Activity</div><div class="stat-value">${Math.floor(totalMins/60)}h ${totalMins%60}m</div></div>
    <div class="stat-pill"><div class="stat-label">Meetings Logged</div><div class="stat-value">${meetings}</div></div>
  `;
}

function renderCards() {
  const grid = document.getElementById("cardGrid");
  grid.innerHTML = empNames.map((name,idx) => {
    const info = TEAM_DATA[name];
    const color = COLORS[idx%COLORS.length];
    const events = (info.events||[]).filter(e=>e.date===activeDate);
    const count = events.length;

    const tasksHtml = count===0
      ? '<p class="no-tasks">No tasks logged for this date.</p>'
      : events.map(e=>{
          const isLunch=/lunch|break/i.test(e.title);
          const dot=isLunch?"#94a3b8":color;
          const durBadge = (e.dur>0&&!isLunch)?`<span class="dur-badge">${fmtDur(e.dur)}</span>`:"";
          return `<div class="task-row">
            <div class="task-dot" style="background:${dot}"></div>
            <div class="task-body">
              <div class="task-time">${e.start} – ${e.end}</div>
              <div class="task-title ${isLunch?"lunch-task":""}">${e.title}</div>
              ${durBadge}
            </div>
          </div>`;
        }).join("");

    return `<div class="emp-card" data-name="${name.toLowerCase()}">
      <div class="card-header" style="border-left:4px solid ${color}">
        <div class="emp-avatar" style="background:${color}">${name[0].toUpperCase()}</div>
        <div class="emp-meta">
          <div class="emp-name">${name}</div>
          <div class="emp-email">${info.email||""}</div>
        </div>

      </div>
      <div class="insight-box">💡 ${insight(name,events)}</div>
      <div class="tasks-list">${tasksHtml}</div>
    </div>`;
  }).join("");
}

function filterCards() {
  const q = document.getElementById("searchBox").value.toLowerCase();
  document.querySelectorAll(".emp-card").forEach(c=>{
    c.classList.toggle("hidden", q&&!c.dataset.name.includes(q));
  });
}
