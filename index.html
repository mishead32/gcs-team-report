const roles = {"Mehak":"Operations","Rajinder":"MIS / Strategy","Priyanka":"Executive Assistant","Arun Sharma":"Content Writer","Boney":"Content Writer","Gunjan":"Design","Ayush":"Graphic Designer","Diksha":"MIS","Santosh K":"Secretary","Devinder":"SEO","Alok":"Accounts","Rohit":"Accounts"};
const colors = ["#6366f1","#8b5cf6","#ec4899","#f59e0b","#10b981","#3b82f6","#ef4444","#14b8a6","#f97316","#84cc16","#06b6d4","#a855f7"];
const empNames = ["Mehak","Rajinder","Priyanka","Arun Sharma","Boney","Gunjan","Ayush","Diksha","Santosh K","Devinder","Alok","Rohit"];

function getDateKey(name) {
  const rows = teamData[name];
  if (!rows || rows.length === 0) return null;
  return Object.keys(rows[0])[0];
}

function getEvents(name, date) {
  const dateKey = getDateKey(name);
  if (!dateKey) return [];
  const rx = /^\d{2}\/\d{2}\/\d{4}$/;
  return (teamData[name] || []).filter(r => r[dateKey] === date && rx.test(r[dateKey]));
}

function fmtTime(ts) {
  if (!ts) return '';
  const p = ts.split(' ');
  return p.length > 1 ? p[1].slice(0,5) : '';
}

function calcDur(start, end) {
  if (!start || !end) return '';
  const s = start.split(' ')[1], e = end.split(' ')[1];
  if (!s || !e) return '';
  const sm = parseInt(s.slice(0,2))*60 + parseInt(s.slice(3,5));
  const em = parseInt(e.slice(0,2))*60 + parseInt(e.slice(3,5));
  const diff = em - sm;
  if (diff <= 0) return '';
  const h = Math.floor(diff/60), m = diff%60;
  return h > 0 ? (m > 0 ? h+'h '+m+'m' : h+'h') : m+'m';
}

function updateDashboard() {
  const date = document.getElementById('dateSelect').value;
  
  // Insights
  let total = 0, active = 0, topName = '', topN = 0;
  empNames.forEach(name => {
    const evs = getEvents(name, date);
    total += evs.length;
    if (evs.length > 0) active++;
    if (evs.length > topN) { topN = evs.length; topName = name; }
  });
  document.getElementById('ins-total').textContent = total;
  document.getElementById('ins-active').textContent = active + ' / 12';
  document.getElementById('ins-top').textContent = topName ? topName + ' (' + topN + ')' : '—';
  document.getElementById('ins-date').textContent = date;
  document.getElementById('teamCount').textContent = active;
  document.getElementById('dateHeading').innerHTML = '<strong>Events for ' + date + '</strong> · ' + total + ' tasks across team';

  // Cards
  const grid = document.getElementById('cardGrid');
  grid.innerHTML = '';
  empNames.forEach((name, idx) => {
    const events = getEvents(name, date);
    const color = colors[idx % colors.length];
    const initial = name.charAt(0).toUpperCase();
    const role = roles[name] || 'Team Member';
    
    let tasksHtml = '';
    if (events.length === 0) {
      tasksHtml = '<div class="no-tasks">No events recorded</div>';
    } else {
      tasksHtml = events.map(e => {
        const st = fmtTime(e['Start Time']);
        const dur = calcDur(e['Start Time'], e['End Time']);
        return '<div class="task-item">' +
          (st ? '<div class="task-time">' + st + '</div>' : '') +
          '<div><div class="task-title">' + (e['Event Title'] || '').replace(/</g,'&lt;') + '</div>' +
          (dur ? '<div class="task-dur">⏱ ' + dur + '</div>' : '') +
          '</div></div>';
      }).join('');
    }
    
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = 
      '<div class="card-header">' +
        '<div class="avatar" style="background:' + color + '">' + initial + '</div>' +
        '<div><div class="card-name">' + name + '</div><div class="card-role">' + role + '</div></div>' +
        (events.length > 0 ? '<div class="task-count">' + events.length + ' tasks</div>' : '') +
      '</div>' +
      '<div class="card-body">' + tasksHtml + '</div>';
    grid.appendChild(card);
  });
}

updateDashboard();
</script>
