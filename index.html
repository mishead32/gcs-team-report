    for (const e of dayEvents) {
      if (e.startTime && e.endTime) {
        const s = new Date(e.startTime.replace(/(d{2})/(d{2})/(d{4})/, '$3-$2-$1'));
        const en = new Date(e.endTime.replace(/(d{2})/(d{2})/(d{4})/, '$3-$2-$1'));
        if (!isNaN(s) && !isNaN(en)) mins += (en - s) / 60000;
      }
      // Theme detection
      const t = e.title.toLowerCase();
      if (t.includes('meeting')) themes['Meetings'] = (themes['Meetings']||0)+1;
      if (t.includes('report')) themes['Reports'] = (themes['Reports']||0)+1;
      if (t.includes('audit')) themes['Audits'] = (themes['Audits']||0)+1;
      if (t.includes('follow') || t.includes('follow-up')) themes['Follow-ups'] = (themes['Follow-ups']||0)+1;
      if (t.includes('ai') || t.includes('bot') || t.includes('automat')) themes['AI/Tech'] = (themes['AI/Tech']||0)+1;
    }
    if (mins > mostMinutes) { mostMinutes = mins; mostTime = name; }
  }

  const topThemes = Object.entries(themes).sort((a,b)=>b[1]-a[1]).slice(0,3);
  const activeCount = Object.values(empData).filter(ev => ev.some(e=>e.date===date)).length;

  if (busiest) insights.push({title:'Most Active', text: busiest + ' led the day with ' + busiestCount + ' logged tasks.', color:'#6366f1'});
  if (mostTime && mostMinutes > 60) insights.push({title:'Longest Work Block', text: mostTime + ' logged approx. ' + Math.round(mostMinutes/60*10)/10 + ' hours of tracked activity.', color:'#10b981'});
  if (topThemes.length) insights.push({title:'Top Activity Themes', text: topThemes.map(([k,v])=>k+' ('+v+')').join(', ') + '.', color:'#f59e0b'});
  insights.push({title:'Team Engagement', text: activeCount + ' of 12 team members logged tasks for this date.', color:'#0ea5e9'});
  if (activeCount < 6) insights.push({title:'⚠ Low Coverage', text: 'Less than half the team has data for this date. Some members may not have logged tasks.', color:'#ef4444'});

  return insights;
}

function filterByDate(date) {
  const grid = document.getElementById('cardsGrid');
  const insightsGrid = document.getElementById('insightsGrid');
  grid.innerHTML = '';
  insightsGrid.innerHTML = '';

  let totalTasks = 0, activeMembers = 0;

  // Insights
  const insights = generateInsights(date, DATA);
  for (const ins of insights) {
    insightsGrid.innerHTML += '<div class="insight-card" style="border-color:'+ins.color+'"><strong>'+ins.title+'</strong><p>'+ins.text+'</p></div>';
  }

  // Employee cards
  for (let i = 0; i < EMP_ORDER.length; i++) {
    const name = EMP_ORDER[i];
    const color = COLORS[i];
    const allEvents = DATA[name] || [];
    const dayEvents = allEvents.filter(e => e.date === date).sort((a,b) => {
      return (a.startTime || '').localeCompare(b.startTime || '');
    });

    if (dayEvents.length > 0) { activeMembers++; totalTasks += dayEvents.length; }

    const tasksHtml = dayEvents.length > 0 
      ? '<ul class="task-list">' + dayEvents.map(e => 
          '<li class="task-item"><div class="task-dot" style="background:'+color+'"></div><div class="task-content"><div class="task-title">'+e.title+'</div>'+(e.startTime?'<div class="task-time">'+formatTime(e.startTime)+(e.endTime?' → '+formatTime(e.endTime):'')+'</div>':'')+'</div></li>'
        ).join('') + '</ul>'
      : '<div class="no-tasks">No tasks logged for this date</div>';

    grid.innerHTML += '<div class="card"><div class="card-header"><div class="avatar" style="background:'+color+'">'+getInitials(name)+'</div><div><div class="card-name">'+name+'</div><div class="card-meta">'+dayEvents.length+' task'+(dayEvents.length!==1?'s':'')+' logged</div></div></div><div class="card-body">'+tasksHtml+'</div></div>';
  }

  // Update stats
  document.getElementById('statTotal').textContent = totalTasks;
  document.getElementById('statActive').textContent = activeMembers;
  document.getElementById('statAvg').textContent = activeMembers > 0 ? Math.round(totalTasks/activeMembers*10)/10 : 0;
}

// Init with first (latest) date
filterByDate(document.getElementById('dateFilter').value);
</script>
