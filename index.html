<head>

<title>GCS Team Daily Report</title>
<style>
  :root {
    --primary: #4361ee;
    --primary-light: #ebedff;
    --bg: #f0f2f5;
    --card: #ffffff;
    --text: #1a1a2e;
    --muted: #6c757d;
    --border: #e2e8f0;
    --success: #2a9d8f;
    --warning: #f4a261;
    --danger: #e63946;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  
  /* Header */
  .header { background: linear-gradient(135deg, #4361ee 0%, #7209b7 100%); color: white; padding: 24px 32px; box-shadow: 0 4px 20px rgba(67,97,238,0.3); }
  .header-inner { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  .header h1 { font-size: 1.6rem; font-weight: 700; display: flex; align-items: center; gap: 10px; }
  .header h1 span.logo { font-size: 1.8rem; }
  .header-meta { font-size: 0.82rem; opacity: 0.85; text-align: right; }
  .header-meta strong { display: block; font-size: 0.9rem; opacity: 1; }

  /* Summary bar */
  .summary-bar { background: white; border-bottom: 1px solid var(--border); padding: 16px 32px; }
  .summary-inner { max-width: 1400px; margin: 0 auto; display: flex; gap: 32px; flex-wrap: wrap; align-items: center; }
  .stat { display: flex; flex-direction: column; }
  .stat-val { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
  .stat-lbl { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }

  /* Date filter */
  .filter-section { max-width: 1400px; margin: 24px auto 0; padding: 0 32px; }
  .filter-label { font-size: 0.8rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
  .date-pills { display: flex; gap: 8px; flex-wrap: wrap; }
  .date-pill { padding: 6px 16px; border-radius: 20px; border: 1.5px solid var(--border); background: white; cursor: pointer; font-size: 0.83rem; font-weight: 500; color: var(--muted); transition: all 0.2s; white-space: nowrap; }
  .date-pill:hover { border-color: var(--primary); color: var(--primary); }
  .date-pill.active { background: var(--primary); color: white; border-color: var(--primary); }

  /* Employee filter */
  .emp-filter { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
  .emp-chip { padding: 4px 12px; border-radius: 12px; font-size: 0.78rem; font-weight: 500; cursor: pointer; transition: all 0.2s; border: 1.5px solid transparent; }
  .emp-chip.active { color: white; }
  .emp-chip:not(.active) { background: white; color: var(--muted); border-color: var(--border); }

  /* Grid */
  .grid { max-width: 1400px; margin: 20px auto 40px; padding: 0 32px; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
  
  /* Employee card */
  .emp-card { background: var(--card); border-radius: 14px; box-shadow: var(--shadow); overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; border: 1px solid var(--border); }
  .emp-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
  .card-header { padding: 16px 20px; display: flex; align-items: center; gap: 14px; }
  .avatar { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; font-weight: 700; color: white; flex-shrink: 0; }
  .card-title { flex: 1; }
  .card-title h3 { font-size: 1rem; font-weight: 700; color: var(--text); }
  .card-title small { font-size: 0.75rem; color: var(--muted); }
  .task-count-badge { background: var(--primary-light); color: var(--primary); font-size: 0.75rem; font-weight: 700; padding: 3px 9px; border-radius: 10px; flex-shrink: 0; }
  .task-count-badge.zero { background: #f0f0f0; color: #aaa; }
  .card-body { padding: 0 20px 16px; }
  .task-item { padding: 10px 0; border-top: 1px solid var(--border); }
  .task-title { font-size: 0.85rem; font-weight: 600; color: var(--text); line-height: 1.3; }
  .task-meta { margin-top: 4px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .task-time { font-size: 0.75rem; color: var(--muted); display: flex; align-items: center; gap: 4px; }
  .task-time::before { content: '🕐'; font-size: 0.7rem; }
  .task-desc { font-size: 0.78rem; color: var(--muted); margin-top: 3px; font-style: italic; line-height: 1.3; }
  .no-tasks { text-align: center; padding: 20px 0; color: #bbb; font-size: 0.85rem; }
  .no-tasks span { font-size: 1.8rem; display: block; margin-bottom: 6px; }
  .card-insight { margin: 0 20px 16px; background: linear-gradient(135deg, #f0f4ff 0%, #f8f0ff 100%); border-radius: 8px; padding: 10px 14px; font-size: 0.78rem; color: #4a4a8a; line-height: 1.4; }
  .card-insight strong { display: block; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px; color: var(--primary); }

  /* Insights panel */
  .insights-section { max-width: 1400px; margin: 0 auto 30px; padding: 0 32px; }
  .insights-panel { background: white; border-radius: 14px; padding: 20px 24px; box-shadow: var(--shadow); border-left: 4px solid var(--primary); }
  .insights-panel h2 { font-size: 1rem; font-weight: 700; margin-bottom: 12px; color: var(--primary); display: flex; align-items: center; gap: 8px; }
  .insights-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
  .insight-item { background: var(--bg); border-radius: 10px; padding: 12px 16px; }
  .insight-item .ins-emp { font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--primary); margin-bottom: 4px; }
  .insight-item .ins-text { font-size: 0.83rem; color: var(--text); line-height: 1.4; }

  /* Footer */
  .footer { text-align: center; padding: 20px; color: var(--muted); font-size: 0.78rem; border-top: 1px solid var(--border); background: white; }
  
  .hidden { display: none; }
</style>
</head>

const sortedDates = ["04/05/2026","02/05/2026","01/05/2026","30/04/2026","29/04/2026","28/04/2026","27/04/2026","25/04/2026","24/04/2026","23/04/2026","22/04/2026","21/04/2026","20/04/2026","19/04/2026","18/04/2026","17/04/2026","16/04/2026"];
const empList = ["Mehak","Rajinder","Priyanka","Arun Sharma","Boney","Gunjan","Ayush","Diksha","Santosh K","Devinder","Alok","Rohit"];
const colors = ["#4361ee","#e63946","#2a9d8f","#e9c46a","#f4a261","#264653","#a8dadc","#457b9d","#1d3557","#6d6875","#b5838d","#52b788"];

let selectedDate = sortedDates[0] || '';
let selectedEmps = new Set(empList);

function formatTime(t) {
  if (!t) return '';
  // t might be "16/04/2026 09:15:00" or "09:15:00"
  const parts = t.split(' ');
  const timePart = parts[parts.length-1];
  const [h,m] = timePart.split(':');
  if (!h || !m) return t;
  const hr = parseInt(h);
  const ampm = hr >= 12 ? 'PM' : 'AM';
  const hr12 = hr === 0 ? 12 : hr > 12 ? hr-12 : hr;
  return hr12 + ':' + m + ' ' + ampm;
}

function getTasksForDate(emp, dateStr) {
  return (allData[emp]||[]).filter(r => {
    const d = (r.date||'').split(' ')[0];
    return d === dateStr;
  });
}

function renderSummary(dateStr) {
  let total = 0, activeEmps = 0;
  empList.forEach(emp => {
    const t = getTasksForDate(emp, dateStr).length;
    total += t;
    if (t > 0) activeEmps++;
  });
  const el = document.getElementById('summaryBar');
  // Format date nicely
  let niceDate = dateStr;
  if (dateStr.includes('/')) {
    const [d,m,y] = dateStr.split('/');
    niceDate = new Date(y,m-1,d).toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  }
  el.innerHTML = `
    <div class="stat"><span class="stat-val">${niceDate}</span><span class="stat-lbl">Selected Date</span></div>
    <div class="stat"><span class="stat-val">${total}</span><span class="stat-lbl">Total Tasks</span></div>
    <div class="stat"><span class="stat-val">${activeEmps} / ${empList.length}</span><span class="stat-lbl">Active Members</span></div>
    <div class="stat"><span class="stat-val">${empList.length}</span><span class="stat-lbl">Team Size</span></div>
  `;
}

function renderDatePills() {
  const container = document.getElementById('datePills');
  container.innerHTML = sortedDates.map(d => 
    `<button class="date-pill ${d===selectedDate?'active':''}" onclick="selectDate('${d}')">${d}</button>`
  ).join('');
}

function renderEmpFilter() {
  const container = document.getElementById('empFilter');
  container.innerHTML = empList.map((emp,i) => {
    const col = colors[i % colors.length];
    const active = selectedEmps.has(emp);
    return `<button class="emp-chip ${active?'active':''}" 
      style="${active?'background:'+col+';border-color:'+col:''}" 
      onclick="toggleEmp('${emp}',${i})">${emp}</button>`;
  }).join('');
}

function generateInsight(emp, tasks) {
  if (tasks.length === 0) return 'No tasks logged for this date.';
  if (tasks.length === 1) return `Working on: "${tasks[0].title}"`;
  const titles = tasks.map(t => t.title).filter(Boolean);
  const uniqueTypes = new Set();
  titles.forEach(t => {
    const tl = t.toLowerCase();
    if (tl.includes('meeting') || tl.includes('review')) uniqueTypes.add('meetings/reviews');
    if (tl.includes('report') || tl.includes('audit') || tl.includes('check')) uniqueTypes.add('reporting');
    if (tl.includes('call') || tl.includes('crm')) uniqueTypes.add('CRM/calls');
    if (tl.includes('training') || tl.includes('session')) uniqueTypes.add('training');
    if (tl.includes('leave') || tl.includes('break')) uniqueTypes.add('leave/break');
  });
  const types = [...uniqueTypes];
  const summary = types.length > 0 
    ? `${tasks.length} tasks: focused on ${types.slice(0,2).join(' & ')}.`
    : `${tasks.length} tasks logged — productive day.`;
  return summary;
}

function renderInsights(dateStr) {
  const grid = document.getElementById('insightsGrid');
  const items = empList.filter(emp => selectedEmps.has(emp)).map((emp,i) => {
    const tasks = getTasksForDate(emp, dateStr);
    if (tasks.length === 0) return '';
    const insight = generateInsight(emp, tasks);
    const col = colors[empList.indexOf(emp) % colors.length];
    return `<div class="insight-item">
      <div class="ins-emp" style="color:${col}">${emp}</div>
      <div class="ins-text">${insight}</div>
    </div>`;
  }).filter(Boolean);
  grid.innerHTML = items.length ? items.join('') : '<div style="color:#aaa;font-size:0.85rem;padding:8px">No tasks for this date.</div>';
}

function renderCards(dateStr) {
  const grid = document.getElementById('cardsGrid');
  const filteredEmps = empList.filter(emp => selectedEmps.has(emp));
  grid.innerHTML = filteredEmps.map((emp, idx) => {
    const i = empList.indexOf(emp);
    const col = colors[i % colors.length];
    const tasks = getTasksForDate(emp, dateStr);
    const initials = emp.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
    const countBadge = tasks.length > 0 
      ? `<span class="task-count-badge">${tasks.length} task${tasks.length>1?'s':''}</span>`
      : `<span class="task-count-badge zero">No tasks</span>`;
    
    const taskHtml = tasks.length === 0 
      ? `<div class="no-tasks"><span>😴</span>No tasks for this date</div>`
      : tasks.map(t => {
          const timeStr = (t.startTime && t.endTime) 
            ? formatTime(t.startTime) + ' – ' + formatTime(t.endTime) 
            : (t.startTime ? formatTime(t.startTime) : '');
          return `<div class="task-item">
            <div class="task-title">${t.title||'Untitled'}</div>
            <div class="task-meta">
              ${timeStr ? `<span class="task-time">${timeStr}</span>` : ''}
            </div>
            ${t.description ? `<div class="task-desc">${t.description}</div>` : ''}
          </div>`;
        }).join('');

    const insight = generateInsight(emp, tasks);

    return `<div class="emp-card" id="card-${emp.replace(/\s+/g,'_')}">
      <div class="card-header">
        <div class="avatar" style="background:${col}">${initials}</div>
        <div class="card-title">
          <h3>${emp}</h3>
          <small>Team Member</small>
        </div>
        ${countBadge}
      </div>
      ${tasks.length > 0 ? `<div class="card-insight"><strong>✨ Insight</strong>${insight}</div>` : ''}
      <div class="card-body">${taskHtml}</div>
    </div>`;
  }).join('');
}

function selectDate(d) {
  selectedDate = d;
  renderAll();
}

function toggleEmp(emp, idx) {
  if (selectedEmps.has(emp)) {
    if (selectedEmps.size > 1) selectedEmps.delete(emp);
  } else {
    selectedEmps.add(emp);
  }
  renderAll();
}

function renderAll() {
  renderDatePills();
  renderEmpFilter();
  renderSummary(selectedDate);
  renderInsights(selectedDate);
  renderCards(selectedDate);
}

renderAll();
</script>
