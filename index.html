<script type="application/json" id="empOrder">["Mehak","Rajinder","Priyanka","Arun Sharma","Boney","Gunjan","Ayush","Diksha","Santosh K","Devinder","Alok","Rohit"]</script>
<script type="application/json" id="empColors">["#6366f1","#0ea5e9","#10b981","#f59e0b","#ef4444","#8b5cf6","#ec4899","#14b8a6","#f97316","#06b6d4","#84cc16","#a78bfa"]</script>

<script>
var DATA = JSON.parse(document.getElementById('teamData').textContent);
var EMP = JSON.parse(document.getElementById('empOrder').textContent);
var COL = JSON.parse(document.getElementById('empColors').textContent);

function initials(n){return n.split(' ').map(function(w){return w[0];}).join('').slice(0,2).toUpperCase();}

function fmtTime(s){
  if(!s) return '';
  var p=s.split(' ');
  if(p.length<2) return s;
  var t=p[1].split(':'), h=parseInt(t[0]), m=t[1];
  return (h>12?h-12:(h||12))+':'+m+' '+(h>=12?'PM':'AM');
}

function insights(date){
  var res=[], busy='', busyN=0, topMins=0, topName='', themes={};
  EMP.forEach(function(name){
    var ev=(DATA[name]||[]).filter(function(e){return e.date===date;});
    if(ev.length>busyN){busyN=ev.length;busy=name;}
    var mins=0;
    ev.forEach(function(e){
      if(e.startTime&&e.endTime){
        var s=new Date(e.startTime.replace(/(\d{2})\/(\d{2})\/(\d{4})/,'$3-$2-$1'));
        var en=new Date(e.endTime.replace(/(\d{2})\/(\d{2})\/(\d{4})/,'$3-$2-$1'));
        if(!isNaN(s)&&!isNaN(en)) mins+=(en-s)/60000;
      }
      var t=(e.title||'').toLowerCase();
      if(t.indexOf('meeting')>=0) themes['Meetings']=(themes['Meetings']||0)+1;
      if(t.indexOf('report')>=0) themes['Reports']=(themes['Reports']||0)+1;
      if(t.indexOf('audit')>=0) themes['Audits']=(themes['Audits']||0)+1;
      if(t.indexOf('follow')>=0) themes['Follow-ups']=(themes['Follow-ups']||0)+1;
      if(t.indexOf('ai')>=0||t.indexOf('bot')>=0) themes['AI/Tech']=(themes['AI/Tech']||0)+1;
    });
    if(mins>topMins){topMins=mins;topName=name;}
  });
  var active=EMP.filter(function(n){return (DATA[n]||[]).some(function(e){return e.date===date;});}).length;
  var topT=Object.entries(themes).sort(function(a,b){return b[1]-a[1];}).slice(0,3);
  if(busy) res.push({t:'Most Active',p:busy+' led the day with '+busyN+' logged tasks.',c:'#6366f1'});
  if(topName&&topMins>60) res.push({t:'Longest Day',p:topName+' tracked approx '+Math.round(topMins/60*10)/10+' hours of activity.',c:'#10b981'});
  if(topT.length) res.push({t:'Top Themes',p:topT.map(function(x){return x[0]+' ('+x[1]+')';}).join(', ')+'.',c:'#f59e0b'});
  res.push({t:'Team Coverage',p:active+' of 12 members logged tasks for this date.',c:'#0ea5e9'});
  if(active<6) res.push({t:'Low Coverage',p:'Fewer than half the team has entries. Some may not have logged yet.',c:'#ef4444'});
  return res;
}

function render(date){
  var cg=document.getElementById('cg'), ig=document.getElementById('ig');
  cg.innerHTML=''; ig.innerHTML='';
  var total=0, active=0;
  insights(date).forEach(function(ins){
    ig.innerHTML+='<div class="insight-card" style="border-color:'+ins.c+'"><strong>'+ins.t+'</strong><p>'+ins.p+'</p></div>';
  });
  EMP.forEach(function(name,i){
    var col=COL[i];
    var ev=((DATA[name]||[]).filter(function(e){return e.date===date;})).sort(function(a,b){return (a.startTime||'').localeCompare(b.startTime||'');});
    if(ev.length>0){active++;total+=ev.length;}
    var tasks=ev.length>0
      ?'<ul class="task-list">'+ev.map(function(e){
          return '<li class="task-item"><div class="task-dot" style="background:'+col+'"></div><div><div class="task-title">'+e.title+'</div>'+(e.startTime?'<div class="task-time">'+fmtTime(e.startTime)+(e.endTime?' → '+fmtTime(e.endTime):'')+'</div>':'')+'</div></li>';
        }).join('')+'</ul>'
      :'<div class="no-tasks">No tasks logged for this date</div>';
    cg.innerHTML+='<div class="card"><div class="card-header"><div class="avatar" style="background:'+col+'">'+initials(name)+'</div><div><div class="card-name">'+name+'</div><div class="card-meta">'+ev.length+' task'+(ev.length!==1?'s':'')+' logged</div></div></div><div class="card-body">'+tasks+'</div></div>';
  });
  document.getElementById('sTotal').textContent=total;
  document.getElementById('sActive').textContent=active;
  document.getElementById('sAvg').textContent=active>0?Math.round(total/active*10)/10:0;
}

render(document.getElementById('df').value);
</script>
