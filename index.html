<style>

  header{background:linear-gradient(135deg,#1e1b4b 0%,#312e81 50%,#4f46e5 100%);color:#fff;padding:24px 32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;box-shadow:0 4px 20px rgba(79,70,229,.4)}

  header h1 span{font-weight:300;opacity:.8}
  .header-right{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .date-badge{background:rgba(255,255,255,.15);padding:6px 14px;border-radius:20px;font-size:.85rem;backdrop-filter:blur(4px)}
  .live-dot{width:8px;height:8px;background:#4ade80;border-radius:50%;display:inline-block;margin-right:6px;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .controls{background:#fff;padding:16px 32px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;border-bottom:1px solid #e2e8f0;box-shadow:0 1px 4px rgba(0,0,0,.06)}

  select{padding:8px 14px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:.9rem;color:#1e293b;background:#fff;cursor:pointer;outline:none;transition:border .2s}
  select:focus{border-color:#4f46e5}
  .stats-bar{background:#fff;padding:12px 32px;display:flex;gap:24px;border-bottom:1px solid #e2e8f0;flex-wrap:wrap}
  .stat{display:flex;align-items:center;gap:8px}
  .stat-num{font-size:1.4rem;font-weight:700;color:#4f46e5}
  .stat-label{font-size:.8rem;color:#64748b;line-height:1.2}
  main{padding:24px 32px;max-width:1600px;margin:0 auto}
  .section-title{font-size:1rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.05em;margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid #e2e8f0}
  .insights-box{background:linear-gradient(135deg,#ede9fe,#dbeafe);border:1px solid #c4b5fd;border-radius:12px;padding:20px 24px;margin-bottom:28px}
  .insights-box h3{color:#4f46e5;font-size:.95rem;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
  .insights-list{list-style:none;display:flex;flex-direction:column;gap:6px}
  .insights-list li{font-size:.88rem;color:#374151;padding:6px 10px;background:rgba(255,255,255,.6);border-radius:6px;border-left:3px solid #4f46e5}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px}
  .card{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.07);transition:transform .2s,box-shadow .2s}
  .card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.12)}
  .card-header{padding:16px 20px;display:flex;align-items:center;gap:12px;color:#fff}
  .avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1rem;flex-shrink:0;background:rgba(255,255,255,.25);border:2px solid rgba(255,255,255,.4)}
  .emp-name{font-weight:700;font-size:1rem}
  .task-count{margin-left:auto;background:rgba(255,255,255,.25);padding:3px 10px;border-radius:12px;font-size:.8rem;font-weight:600}
  .card-body{padding:16px 20px}
  .no-data{color:#94a3b8;font-size:.88rem;text-align:center;padding:24px 0;font-style:italic}
  .task-item{padding:10px 12px;border-radius:8px;margin-bottom:8px;background:#f8fafc;border-left:3px solid #4f46e5}
  .task-title{font-size:.88rem;color:#1e293b;font-weight:500;line-height:1.4;margin-bottom:4px}
  .task-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .time-badge{font-size:.75rem;color:#64748b;background:#e2e8f0;padding:2px 8px;border-radius:4px;white-space:nowrap}
  .desc{font-size:.78rem;color:#64748b;margin-top:5px;line-height:1.4}
  footer{text-align:center;padding:24px;color:#94a3b8;font-size:.8rem;border-top:1px solid #e2e8f0;margin-top:16px}
  .no-emp-data{opacity:.5}
  @media(max-width:600px){header{padding:16px};main{padding:16px}}
</style>

const EMPLOYEES = ["Mehak","Rajinder","Priyanka","Arun Sharma","Boney","Gunjan","Ayush","Diksha","Santosh K","Devinder","Alok","Rohit"];
const COLORS = ["#4f46e5","#0891b2","#059669","#d97706","#dc2626","#7c3aed","#be185d","#0369a1","#4d7c0f","#b45309","#0e7490","#7e22ce"];

function fmtDate(d) {
  if (!d) return '';
  const parts = d.split('-');
  if (parts.length !== 3) return d;
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${parseInt(parts[2])} ${months[parseInt(parts[1])-1]} ${parts[0]}`;
}

function getInitials(name) {
  return name.split(' ').map(p => p[0]).join('').substring(0,2).toUpperCase();
}

function renderDashboard(selectedDate) {
  const grid = document.getElementById('cardsGrid');
  const insightsList = document.getElementById('insightsList');
  grid.innerHTML = '';
  
  let totalTasks = 0, activeMembers = 0;
  const empTaskCounts = [];
  
  EMPLOYEES.forEach((emp, idx) => {
    const empData = DATA[emp] || {};
    const tasks = empData[selectedDate] || [];
    totalTasks += tasks.length;
    if (tasks.length > 0) activeMembers++;
    empTaskCounts.push({emp, count: tasks.length, color: COLORS[idx % COLORS.length]});
    
    const card = document.createElement('div');
    card.className = 'card' + (tasks.length === 0 ? ' no-emp-data' : '');
    
    const headerDiv = document.createElement('div');
    headerDiv.className = 'card-header';
    headerDiv.style.background = `linear-gradient(135deg, ${COLORS[idx % COLORS.length]}, ${COLORS[idx % COLORS.length]}cc)`;
    headerDiv.innerHTML = `
      <div class="avatar">${getInitials(emp)}</div>
      <div class="emp-name">${emp}</div>
      <div class="task-count">${tasks.length} task${tasks.length !== 1 ? 's' : ''}</div>
    `;
    card.appendChild(headerDiv);
    
    const body = document.createElement('div');
    body.className = 'card-body';
    
    if (tasks.length === 0) {
      body.innerHTML = '<div class="no-data">No tasks logged for this date</div>';
    } else {
      tasks.forEach(task => {
        const item = document.createElement('div');
        item.className = 'task-item';
        item.style.borderLeftColor = COLORS[idx % COLORS.length];
        
        let metaHTML = '';
        if (task.startTime || task.endTime) {
          metaHTML = `<div class="task-meta"><span class="time-badge">⏰ ${task.startTime || '?'} – ${task.endTime || '?'}</span></div>`;
        }
        let descHTML = task.description ? `<div class="desc">${task.description}</div>` : '';
        
        item.innerHTML = `<div class="task-title">${task.title || '(untitled)'}</div>${metaHTML}${descHTML}`;
        body.appendChild(item);
      });
    }
    
    card.appendChild(body);
    grid.appendChild(card);
  });
  
  // Stats
  document.getElementById('statActive').textContent = activeMembers;
  document.getElementById('statTasks').textContent = totalTasks;
  document.getElementById('statAvg').textContent = activeMembers > 0 ? (totalTasks / activeMembers).toFixed(1) : '0';
  document.getElementById('statDate').textContent = fmtDate(selectedDate);
  
  // Insights
  const sorted = [...empTaskCounts].sort((a,b) => b.count - a.count);
  const top3 = sorted.filter(e => e.count > 0).slice(0,3);
  const inactive = sorted.filter(e => e.count === 0).map(e => e.emp);
  const insights = [];
  if (top3.length > 0) insights.push(`🏆 Most active: ${top3.map(e => `${e.emp} (${e.count})`).join(', ')}`);
  if (inactive.length > 0 && inactive.length < EMPLOYEES.length) insights.push(`⚠️ No data logged: ${inactive.join(', ')}`);
  if (totalTasks > 0) insights.push(`📊 Team logged ${totalTasks} activities across ${activeMembers} members on this day`);
  if (activeMembers === EMPLOYEES.length) insights.push(`✅ Full team participation — all ${EMPLOYEES.length} members logged activity!`);
  else if (activeMembers === 0) insights.push(`📭 No activities logged for this date — may be a holiday or weekend`);
  
  insightsList.innerHTML = insights.map(i => `<li>${i}</li>`).join('');
}

// Init
const sel = document.getElementById('dateSelect');
sel.value = DATES[0] || '';
renderDashboard(DATES[0] || '');
