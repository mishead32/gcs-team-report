const employees = DATA.employees;
const allDates = DATA.allDates;
const colors = DATA.colors;
const nameOrder = DATA.nameOrder;

function fmtDate(d) {
  if (!d) return '';
  const [day, mon, yr] = d.split('/');
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return day + ' ' + months[parseInt(mon)-1] + ' ' + yr;
}

function dayFull(d) {
  const [day, mon, yr] = d.split('/').map(Number);
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  return days[new Date(yr, mon-1, day).getDay()];
}

function initials(name) {
  return name.split(' ').map(w => w[0]).join('').substring(0,2).toUpperCase();
}

function genInsight(name, byDate) {
  const tasks = Object.values(byDate).flat();
  if (tasks.length === 0) return 'No activity data available.';
  const activeDays = Object.keys(byDate).length;
  const avg = (tasks.length / activeDays).toFixed(1);
  const words = tasks.map(t => t.title.toLowerCase()).join(' ');
  const focus = [];
  if (words.includes('report') || words.includes('audit')) focus.push('reporting');
  if (words.includes('meeting')) focus.push('meetings');
  if (words.includes('crm') || words.includes('lead')) focus.push('CRM');
  if (words.includes('bips') || words.includes('school')) focus.push('BIPS');
  if (words.includes('social') || words.includes('content')) focus.push('content');
  if (words.includes('account') || words.includes('billing')) focus.push('accounts');
  if (words.includes('training') || words.includes('review')) focus.push('reviews');
  if (words.includes('walk') || words.includes('walkin')) focus.push('walkins');
  const focusStr = focus.length > 0 ? focus.slice(0,3).join(', ') : 'general operations';
  return 'Active ' + activeDays + ' day' + (activeDays>1?'s':'') + ' · Avg ' + avg + ' tasks/day · Focus: ' + focusStr;
}

function showDate(date) {
  // Update buttons
  document.querySelectorAll('.date-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.date-btn').forEach(b => { if (b.getAttribute('onclick').includes("'" + date + "'")) b.classList.add('active'); });
  
  // Update heading
  document.getElementById('current-date-heading').textContent = dayFull(date) + ', ' + fmtDate(date);
  
  // Count stats
  let totalTasks = 0, activeMembers = 0;
  nameOrder.forEach(name => {
    const tasks = (employees[name] || {})[date] || [];
    if (tasks.length > 0) { totalTasks += tasks.length; activeMembers++; }
  });
  
  document.getElementById('current-date-sub').textContent = activeMembers + ' team member' + (activeMembers!==1?'s':'') + ' logged activity · ' + totalTasks + ' total tasks recorded';
  document.getElementById('total-tasks-hdr').textContent = totalTasks;
  document.getElementById('active-members-hdr').textContent = activeMembers;
  
  // Summary bar
  const summaryEl = document.getElementById('summary-bar');
  summaryEl.innerHTML = [
    {val: totalTasks, lbl: 'Total Tasks', color: '#818CF8'},
    {val: activeMembers, lbl: 'Active Members', color: '#4ADE80'},
    {val: nameOrder.length - activeMembers, lbl: 'No Data', color: '#F87171'},
    {val: totalTasks > 0 ? (totalTasks/Math.max(activeMembers,1)).toFixed(1) : '0', lbl: 'Avg Tasks/Person', color: '#FBBF24'}
  ].map(s => `<div class="sum-card"><div class="sum-card-val" style="color:${s.color}">${s.val}</div><div class="sum-card-lbl">${s.lbl}</div></div>`).join('');
  
  // Cards
  const grid = document.getElementById('cards-grid');
  grid.innerHTML = nameOrder.map(name => {
    const color = colors[name] || '#4F46E5';
    const byDate = employees[name] || {};
    const tasks = byDate[date] || [];
    const hasData = tasks.length > 0;
    const insight = genInsight(name, byDate);
    
    const taskHTML = hasData 
      ? tasks.map(t => `<div class="task-item">
          <div class="task-dot" style="background:${color}"></div>
          <div class="task-time">${t.start || '—'} → ${t.end || '—'}</div>
          <div class="task-title">${t.title || '(untitled)'}</div>
        </div>`).join('')
      : '<div class="no-task-msg">📭 No tasks logged for this date</div>';
    
    return `<div class="emp-card ${hasData ? '' : 'no-data'}">
      <div class="card-header">
        <div class="avatar" style="background:${color}">${initials(name)}</div>
        <div>
          <div class="card-name">${name}</div>
          <div class="card-role">GCS Team Member</div>
        </div>
        <div class="badge ${hasData ? 'active-badge' : 'empty-badge'}">${hasData ? tasks.length + ' task' + (tasks.length!==1?'s':'') : 'no data'}</div>
      </div>
      <div class="card-insights">
        <div class="insight-label">🔍 Activity Insight</div>
        <div class="insight-text">${insight}</div>
      </div>
      <div class="card-tasks">${taskHTML}</div>
    </div>`;
  }).join('');
}

// Show latest date by default
showDate(allDates[allDates.length - 1]);
